apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-api
  namespace: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend-api

  template:
    metadata:
      labels:
        app: backend-api

    spec:
      containers:
      - name: backend-api

        image: docshaik/shaik-backend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: postgres-service

        - name: DB_NAME
          value: companydb

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        readinessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service

metadata:
  name: backend-service
  namespace: backend

spec:
  selector:
    app: backend-api

  ports:
  - port: 80
    targetPort: 5000
