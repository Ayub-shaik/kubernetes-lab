apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-api
  namespace: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend-api

  template:
    metadata:
      labels:
        app: backend-api

    spec:
      containers:
      - name: backend-api

        image: hashicorp/http-echo

        args:
        - "-text=Hello from backend API"

        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service

metadata:
  name: backend-service
  namespace: backend

spec:
  selector:
    app: backend-api

  ports:
  - port: 80
    targetPort: 5678