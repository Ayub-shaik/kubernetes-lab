apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-app
  namespace: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend-app

  template:
    metadata:
      labels:
        app: frontend-app

    spec:
      containers:
      - name: frontend-app

        image: nginx:1.27

        ports:
        - containerPort: 80

        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html

      volumes:
      - name: html-volume

        configMap:
          name: frontend-html

---
apiVersion: v1
kind: Service

metadata:
  name: frontend-service
  namespace: backend

spec:
  selector:
    app: frontend-app

  ports:
  - port: 80
    targetPort: 80
